<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.ico" />

    <!-- FIXED: removed user-scalable=no, maximum-scale=1.0 (accessibility + Lighthouse) -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

    <meta name="theme-color" content="#09090b" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />

    <link rel="icon" type="image/png" sizes="48x48" href="/icon-48x48.png" />

    <!-- SEO -->
    <title>SneakersHub — Buy & Sell Sneakers in Ghana</title>
    <meta name="description" content="Ghana's #1 sneaker marketplace. Buy and sell Nike, Adidas, Jordan, New Balance and more. Fast delivery across Ghana." />
    <meta name="keywords" content="sneakers Ghana, buy sneakers Ghana, sell sneakers Ghana, Nike Ghana, Adidas Ghana, Jordan Ghana" />

    <!-- Open Graph (WhatsApp / Facebook previews) -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="SneakersHub — Buy & Sell Sneakers in Ghana" />
    <meta property="og:description" content="Ghana's #1 sneaker marketplace. Find your next pair today." />
    <meta property="og:url" content="https://sneakershub.site" />
    <meta property="og:image" content="https://sneakershub.site/og-image.png" />

    <!-- Twitter/X -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="SneakersHub — Buy & Sell Sneakers in Ghana" />
    <meta name="twitter:description" content="Ghana's #1 sneaker marketplace. Find your next pair today." />
    <meta name="twitter:image" content="https://sneakershub.site/og-image.png" />

    <!-- ADDED: Preconnect to Google Fonts origins early so the browser
         opens the TCP/TLS connection before the CSS request fires.
         crossorigin is required on gstatic for font file fetches. -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <!-- ADDED: If your CSS bundle imports Google Fonts, this preconnect above
         is enough. But if you have a direct <link> to fonts.googleapis.com
         elsewhere, replace it with the non-blocking pattern below.
         Swap YOUR_FONT_URL with your actual fonts.googleapis.com/css2?... URL.

    <link rel="preload" as="style"
      href="https://fonts.googleapis.com/css2?family=YOUR_FONT_URL&display=swap"
      onload="this.onload=null;this.rel='stylesheet'" />
    <noscript>
      <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=YOUR_FONT_URL&display=swap" />
    </noscript>
    -->

    <!-- Prevent black screen flash on Safari — set background before React loads -->
    <script>
      (function() {
        try {
          var theme = localStorage.getItem('theme');
          if (!theme) {
            theme = 'light';
          }
          document.documentElement.classList.toggle('dark', theme === 'dark');
          document.documentElement.style.backgroundColor = theme === 'dark' ? '#09090b' : '#ffffff';
        } catch(e) {
          document.documentElement.classList.remove('dark');
          document.documentElement.style.backgroundColor = '#ffffff';
        }
      })();
    </script>

    <style>
      html { background-color: #ffffff; }
      html.dark { background-color: #09090b; }
      body { 
        min-height: 100vh;
        min-height: -webkit-fill-available;
        margin: 0;
        padding: 0;
      }
      html {
        height: -webkit-fill-available;
      }
      * { -webkit-tap-highlight-color: transparent; }
      
      /* Loader Styles */
      #initial-loader {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background-color: #ffffff;
        z-index: 9999;
        transition: opacity 0.3s ease-out;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      }
      
      html.dark #initial-loader {
        background-color: #09090b;
      }
      
      .loader-spinner {
        width: 48px;
        height: 48px;
        border: 3px solid #f3f3f3;
        border-top: 3px solid #f97316;
        border-radius: 50%;
        animation: spin 1s linear infinite;
        margin-bottom: 16px;
      }
      
      html.dark .loader-spinner {
        border-color: #1f2937;
        border-top-color: #f97316;
      }
      
      .loader-text {
        color: #1f2937;
        font-size: 16px;
        font-weight: 500;
        letter-spacing: 0.5px;
      }
      
      html.dark .loader-text {
        color: #e5e7eb;
      }
      
      .loader-subtext {
        color: #6b7280;
        font-size: 14px;
        margin-top: 8px;
      }
      
      html.dark .loader-subtext {
        color: #9ca3af;
      }
      
      @keyframes spin {
        0% { transform: rotate(0deg); }
        100% { transform: rotate(360deg); }
      }
      
      .loader-hidden {
        opacity: 0;
        pointer-events: none;
      }
    </style>
  </head>
  <body>
    <div id="initial-loader">
      <div class="loader-spinner"></div>
      <div class="loader-text">SneakersHub</div>
      <div class="loader-subtext">Loading your sneakers...</div>
    </div>
    
    <div id="root"></div>
    
    <script type="module" src="/src/main.tsx"></script>
    
    <script>
      // Hide loader when React mounts
      window.addEventListener('load', function() {
        var loader = document.getElementById('initial-loader');
        if (loader) {
          setTimeout(function() {
            loader.classList.add('loader-hidden');
          }, 100);
        }
      });
    </script>
  </body>
</html>
