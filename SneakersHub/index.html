<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#09090b" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <title>SneakersHub</title>

    <link rel="apple-touch-icon" href="/icons/icon-180x180.png">
<link rel="manifest" href="/manifest.json">

    <!-- Prevent black screen flash on Safari — set background before React loads -->
    <script>
      (function() {
        try {
          var theme = localStorage.getItem('theme') || 
            (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
          document.documentElement.classList.toggle('dark', theme === 'dark');
          // Set background immediately so Safari never shows black
          document.documentElement.style.backgroundColor = theme === 'dark' ? '#09090b' : '#ffffff';
        } catch(e) {
          // Safari private mode blocks localStorage — default to dark
          document.documentElement.classList.add('dark');
          document.documentElement.style.backgroundColor = '#09090b';
        }
      })();
    </script>

    <style>
      /* Prevent white/black flash before CSS loads */
      html { background-color: #09090b; }
      html.light { background-color: #ffffff; }
      
      /* Safari viewport fix — account for bottom bar */
      body { 
        min-height: 100vh;
        min-height: -webkit-fill-available;
      }
      html {
        height: -webkit-fill-available;
      }

      /* Prevent tap highlight on iOS */
      * { -webkit-tap-highlight-color: transparent; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
