<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="theme-color" content="#09090b" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />

    <!-- SEO -->
    <title>SneakersHub — Buy & Sell Sneakers in Ghana</title>
    <meta name="description" content="Ghana's #1 sneaker marketplace. Buy and sell Nike, Adidas, Jordan, New Balance and more. Fast delivery across Ghana." />
    <meta name="keywords" content="sneakers Ghana, buy sneakers Ghana, sell sneakers Ghana, Nike Ghana, Adidas Ghana, Jordan Ghana" />

    <!-- Open Graph (WhatsApp / Facebook previews) -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="SneakersHub — Buy & Sell Sneakers in Ghana" />
    <meta property="og:description" content="Ghana's #1 sneaker marketplace. Find your next pair today." />
    <meta property="og:url" content="https://sneakershub.site" />
    <meta property="og:image" content="https://sneakershub.site/og-image.png" />

    <!-- Twitter/X -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="SneakersHub — Buy & Sell Sneakers in Ghana" />
    <meta name="twitter:description" content="Ghana's #1 sneaker marketplace. Find your next pair today." />
    <meta name="twitter:image" content="https://sneakershub.site/og-image.png" />

    <!-- Prevent black screen flash on Safari — set background before React loads -->
    <script>
      (function() {
        try {
          var theme = localStorage.getItem('theme') || 
            (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
          document.documentElement.classList.toggle('dark', theme === 'dark');
          document.documentElement.style.backgroundColor = theme === 'dark' ? '#09090b' : '#ffffff';
        } catch(e) {
          document.documentElement.classList.add('dark');
          document.documentElement.style.backgroundColor = '#09090b';
        }
      })();
    </script>

    <style>
      html { background-color: #09090b; }
      html.light { background-color: #ffffff; }
      body { 
        min-height: 100vh;
        min-height: -webkit-fill-available;
      }
      html {
        height: -webkit-fill-available;
      }
      * { -webkit-tap-highlight-color: transparent; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
